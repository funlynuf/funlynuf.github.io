<!DOCTYPE html>
<html>
<body>
<h2>Rock.. Paper.. Scissors..</h2>

<div>
    <input type="radio" id="rockChoice" name="rpsPlayerChoice" value="rock" />
    <label for="rockChoice">Rock</label>
    
    <input type="radio" id="paperChoice" name="rpsPlayerChoice" value="paper" />
    <label for="paperChoice">Paper</label>
    
    <input type="radio" id="scissorsChoice" name="rpsPlayerChoice" value="scissors" />
    <label for="scissorsChoice">Scissors</label>
</div>

<button onclick="randomRockPaperScissors()">G O !!!</button>

<p id="cpuChoice"></p>

<script>
function randomRockPaperScissors() {
    document.getElementById("cpuChoice").style.visibility = "hidden";
    clearTimeout();
    setTimeout(() => {
        document.getElementById("cpuChoice").style.visibility = "visible";
    }
    , 100);

    const choices = ["Rock", "Paper", "Scissors"];
    var randomNum = Math.floor(Math.random() * 3);
    document.getElementById("cpuChoice").innerHTML = choices[randomNum];
}
</script>

</body>
</html>
